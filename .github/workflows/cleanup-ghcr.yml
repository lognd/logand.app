name: Cleanup GHCR

# Every push to main leaves a permanently-tagged backend image behind
# (see deploy.yml -- tags ghcr.io/lognd/logand.app/backend:<sha> in
# addition to :latest), and nothing ever removes old ones. This doesn't
# cost anything on a public package (generous free storage), but the
# version list otherwise grows forever with no cleanup. Runs weekly, plus
# workflow_dispatch for an on-demand manual run.
on:
  schedule:
    - cron: "0 5 * * 0" # Sundays, 05:00 UTC
  workflow_dispatch: {}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      # GHCR_CLEANUP_PAT is a manual, deliberate setup step (see below) --
      # not configuring it yet is a normal, expected state, not a broken
      # workflow. Checking via an env var (not `secrets.X == ''` directly
      # in an `if:`) since secrets aren't reliably usable in `if:`
      # expressions the same way plain env vars are.
      - name: check GHCR_CLEANUP_PAT is configured
        id: check
        env:
          TOKEN: ${{ secrets.GHCR_CLEANUP_PAT }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "GHCR_CLEANUP_PAT is not set -- skipping cleanup this run." \
                 "See this workflow file's own comment for how to create one" \
                 "(classic PAT, read:packages + delete:packages scopes;" \
                 "fine-grained PATs don't currently support package permissions" \
                 "at all)."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - name: delete old backend image versions
        if: steps.check.outputs.configured == 'true'
        uses: actions/delete-package-versions@v5
        with:
          # This package lives under a personal account (not an org) --
          # GITHUB_TOKEN with packages:write reliably handles pushing but
          # not deleting versions of a user-owned package. GHCR_CLEANUP_PAT
          # is a classic PAT scoped to read:packages + delete:packages,
          # added under Settings > Secrets and variables > Actions.
          token: ${{ secrets.GHCR_CLEANUP_PAT }}
          package-name: "logand.app/backend"
          package-type: "container"
          # Keep the 10 most recent versions regardless of age -- covers
          # "roll back to a recent deploy" without needing to reason
          # about a time window at all.
          min-versions-to-keep: 10
          # :latest always points at the newest build anyway (deploy.yml
          # re-tags it every push) -- excluding it here is defense in
          # depth against ever deleting the one tag docker-compose.yml's
          # backend service actually pulls, not just relying on
          # min-versions-to-keep's ordering to protect it.
          ignore-versions: "^latest$"
