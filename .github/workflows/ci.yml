name: CI

# android/** is deliberately excluded from both triggers below -- it has
# its own workflow (android-ci.yml) with its own SDK/Gradle toolchain, and
# an android-only change has no way to affect the backend/frontend/
# wasm-ascii/system-tests jobs here. Without paths-ignore, every android
# commit would still spin up and wait on four unrelated jobs for nothing.
# A push/PR that touches android/** AND another path still runs this
# workflow normally -- paths-ignore only skips when EVERY changed file
# matches.
on:
  pull_request:
    paths-ignore: ["android/**"]
  push:
    branches: [main]
    paths-ignore: ["android/**"]

jobs:
  backend:
    runs-on: ubuntu-latest
    # Official uv image bundles Python 3.12 + uv already installed and on
    # PATH -- skips astral-sh/setup-uv's own download-and-install step
    # entirely (small win on its own, but free since we need a container
    # image either way for the parity requested with wasm-ascii below).
    # bookworm-slim matches backend/Dockerfile's own python:3.12-slim base.
    container: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    # Pinned inside the workspace (not uv's default ~/.cache/uv) so
    # actions/cache below has a stable, checkout-relative path to key on --
    # the container's own $HOME can vary run to run in ways actions/cache
    # can't reliably address. Applies to every step in this job, not just
    # `install`, since `check` also invokes uv.
    env:
      UV_CACHE_DIR: ${{ github.workspace }}/.uv-cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: .uv-cache
          key: ${{ runner.os }}-uv-${{ hashFiles('backend/uv.lock') }}
      - name: install
        working-directory: backend
        run: uv sync
      - name: check
        working-directory: backend
        # NOTE(logan): `frob check` (part of `make check`) needs frob installed; CI installs it
        # via uv's dev dependency group once frob is added to backend/pyproject.toml's dev group.
        run: uv run ruff check src/ tests/ && uv run ruff format --check src/ tests/ && uv run ty check src/ && uv run pytest tests/unit tests/integration -n auto

  prodtest-self-test:
    # Only scripts/prodtest/tests/ -- pure unit tests of the harness's own
    # Cleanup/Probe machinery (revert.py), zero network access. The actual
    # probes in scripts/prodtest/probes/ hit real production over HTTPS/SSH
    # and are deliberately NEVER run here -- see cli.py's module docstring
    # and scripts/prodtest/README.md. This job exists so a change to
    # revert.py's cleanup guarantee gets the same CI safety net as
    # everything else, without ever making a live write to prod on a push.
    runs-on: ubuntu-latest
    container: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    env:
      UV_CACHE_DIR: ${{ github.workspace }}/.uv-cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: .uv-cache
          key: ${{ runner.os }}-uv-${{ hashFiles('backend/uv.lock') }}
      - name: install
        working-directory: backend
        run: uv sync
      - name: run harness self-tests
        working-directory: backend
        run: uv run python -m pytest ../scripts/prodtest/tests -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: install
        working-directory: frontend
        run: npm ci
      - name: check
        working-directory: frontend
        run: npm run lint && npm run typecheck && npm run test

  wasm-ascii:
    runs-on: ubuntu-latest
    # Official Rust image bundles cargo/rustc (and, via rustup's default
    # install profile, clippy + rustfmt already) -- skips
    # dtolnay/rust-toolchain's own download-and-install step, same
    # reasoning as the backend job's uv image above.
    container: rust:1-bookworm
    steps:
      - uses: actions/checkout@v4
      # Defensive, not assumed -- fast no-op if the image's rustup default
      # profile already included these (it does today, but pinning the
      # actual requirement here doesn't depend on that staying true).
      - name: ensure clippy + rustfmt components
        run: rustup component add clippy rustfmt
      - uses: actions/cache@v4
        with:
          # ~/.cargo/registry: downloaded crate sources/index (the
          # equivalent of uv's own package cache above). target/: this
          # crate's own compiled build artifacts -- incremental
          # compilation reusing them is the bigger win of the two for a
          # single-crate project like this one, where dependencies rarely
          # change but source does.
          path: |
            ~/.cargo/registry
            wasm-ascii/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('wasm-ascii/Cargo.lock') }}
      - name: check
        working-directory: wasm-ascii
        run: cargo check && cargo clippy -- -D warnings && cargo fmt --check && cargo test

  system-tests:
    runs-on: ubuntu-latest
    needs: [backend, frontend, wasm-ascii]
    steps:
      - uses: actions/checkout@v4
      - name: bring up test stack
        run: docker compose -f docker-compose.test.yml up -d --build
      - name: wait for backend
        # NOTE(logan): replace with a real healthcheck-based wait once api/health.py exists;
        # a sleep is a placeholder, not a pattern to keep.
        run: sleep 10
      - uses: astral-sh/setup-uv@v3
        with:
          # Caches uv's own download/build cache (~/.cache/uv) keyed on
          # backend/uv.lock -- without this, every system-tests run
          # re-resolves and re-downloads the exact same wheels the
          # `backend` job (running in parallel, on a separate runner)
          # just did, since GitHub-hosted runners are fresh VMs with
          # nothing persisted between jobs or runs on their own.
          enable-cache: true
      - name: backend system tests
        working-directory: backend
        run: uv sync && uv run pytest tests/system -n auto
        env:
          API_BASE_URL: http://localhost:8000
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          # Was missing here (present on the `frontend` job's setup-node,
          # not this one) -- caches node_modules' npm download cache
          # keyed on package-lock.json, same win as the uv cache above.
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: install frontend deps
        working-directory: frontend
        # Deps only -- the actual test run happens inside the official
        # Playwright image below (browsers + their OS-level deps already
        # baked in, nothing to install/download at all), but node_modules
        # itself still needs to exist on disk first so that image can see
        # it via the bind mount.
        run: npm ci
      - name: frontend system tests
        working-directory: frontend
        # Full job-level `container:` (as used for backend/wasm-ascii
        # above) doesn't fit this job -- it also runs `docker compose`
        # against the host, which needs the host's real Docker socket,
        # not a container's own isolated one. Scoping the image to just
        # this one step via a plain `docker run` gets the same "nothing
        # to install" win without fighting that. --network host lets this
        # container reach docker-compose.test.yml's exposed ports (backend
        # on localhost:8000) exactly like a non-containerized process
        # would, and lets its own dev server (Playwright's webServer
        # config spawns `npm run dev` as its child, bound to :5173) be
        # reachable the same way in return.
        #
        # This image tag MUST match @playwright/test's exact resolved
        # version in frontend/package-lock.json -- the npm package and the
        # browsers baked into this image are versioned together, and a
        # mismatch fails with "browserType.launch: Executable doesn't
        # exist" (npm's test runner looking for a browser build the older
        # image never shipped). package.json now pins @playwright/test to
        # this exact version (no ^ range) so a routine `npm install` can't
        # silently drift the resolved version away from what's pinned
        # here again.
        run: |
          docker run --rm --network host \
            -v "$PWD:/work" -w /work \
            -e CI=true \
            -e SEED_ADMIN_EMAIL \
            -e SEED_ADMIN_PASSWORD \
            mcr.microsoft.com/playwright:v1.61.1-jammy \
            npm run test:system
        env:
          # Matches docker-compose.test.yml's backend SEED_ADMIN_EMAIL/
          # PASSWORD exactly -- customer-journey.spec.ts logs in as this
          # account to seed an invoice for the customer it's testing.
          # Declared here (not just inline -e above) so `docker run -e
          # VARNAME` (no =value) has something in the shell's own
          # environment to actually forward.
          SEED_ADMIN_EMAIL: admin-fixture@example.com
          SEED_ADMIN_PASSWORD: admin-fixture-password-not-for-production
      - name: tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
