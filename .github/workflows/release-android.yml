name: Release Android

# Tag-triggered, not push-to-main -- the backend/frontend deploy
# continuously on every main push (deploy.yml), but a mobile APK is
# something a user installs once and updates deliberately, so it gets
# its own versioned artifact per release tag instead of a new build on
# every commit. Push a tag like `v1.2.0` to cut a release.
on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # to create the GitHub Release and upload the APK
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # GitHub's ubuntu-latest runners are x86_64 -- NONE of
      # android/README.md's "Building on aarch64 Linux" qemu/aapt2-
      # override dance applies here, that's only needed on this repo's
      # local aarch64 dev host. A plain SDK install + ./gradlew works
      # unmodified.
      - uses: android-actions/setup-android@v3

      # Tests gate the release -- an APK is never uploaded from a build
      # that didn't pass its own test suite first. :core's tests need no
      # Android SDK at all; :app's need the SDK just installed above.
      - name: test
        working-directory: android
        run: ./gradlew :core:test :app:testDebugUnitTest

      # Release signing -- app/build.gradle.kts's `release` signingConfig
      # reads these exact env vars (LOGAND_KEYSTORE_B64 plus the three
      # passwords/alias below) and falls back to the debug signingConfig
      # if any are missing, so this step only produces a STABLE-signed
      # APK when all four repo secrets are actually configured (see
      # android/README.md's "Release signing" section for how to
      # generate/set them). A stable signing key across every release is
      # the entire point: Android refuses to install an APK over an
      # existing install signed by a DIFFERENT key, which is exactly
      # what the old debug-keystore-per-CI-run approach hit -- in-app
      # auto-update (see android/app/src/main/kotlin/.../ui/update/) is
      # only possible once every release shares one key.
      - name: build signed release APK
        working-directory: android
        env:
          LOGAND_KEYSTORE_B64: ${{ secrets.LOGAND_KEYSTORE_B64 }}
          LOGAND_KEYSTORE_PASSWORD: ${{ secrets.LOGAND_KEYSTORE_PASSWORD }}
          LOGAND_KEY_ALIAS: ${{ secrets.LOGAND_KEY_ALIAS }}
          LOGAND_KEY_PASSWORD: ${{ secrets.LOGAND_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
          body: |
            Signed with this project's stable release key (see
            [android/README.md](https://github.com/${{ github.repository }}/blob/main/android/README.md#release-signing))
            -- install by downloading `app-release.apk` directly to an
            Android device and opening it (allow installs from this
            source when prompted), or `adb install app-release.apk`.
            Because every release shares the same signing key, this
            install will cleanly UPDATE a previous release's install
            rather than requiring an uninstall first, and the app's own
            in-app update banner (checks GitHub's latest release on
            launch) can offer this build directly. See
            [android/README.md](https://github.com/${{ github.repository }}/blob/main/android/README.md#installing-on-a-real-device)
            for device-specific install steps (e.g. Pixel 7a).
