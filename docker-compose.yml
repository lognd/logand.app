# Production topology -- single VPS, see docs/design/11-deployment.md.
# NOTE(logan): caddy serves the prerendered frontend/dist directly (see docs/design/10) --
# there is no separate frontend container in prod, only a build artifact mounted into caddy.
services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/srv/frontend:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

  backend:
    # Both fields intentional: `build` lets a dev build+run locally with
    # no registry involved; `image` is what makes `docker compose pull`
    # (deploy.yml's actual VPS-side deploy step) fetch the exact image
    # ci.yml's build-and-push job just pushed, instead of silently
    # having nothing to pull.
    image: ghcr.io/lognd/logand.app/backend:latest
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      # STORAGE_BACKEND=local (the default -- see backend/.env.example)
      # writes here; without a real named volume this is just container-
      # ephemeral storage, silently losing every uploaded budget-evidence/
      # receipt/document file on the next redeploy or container restart.
      # Mounted at STORAGE_LOCAL_DIR's default value (./data/storage,
      # relative to the image's WORKDIR /app -- see backend/Dockerfile).
      # A deployment using STORAGE_BACKEND=r2 instead doesn't need this
      # volume for correctness (R2 is the real persistence), but it's
      # harmless to leave mounted either way.
      - storage_data:/app/data/storage
      # Shared with the scheduler service below -- both processes' logs
      # land in one place (logging/logger.py's LOG_DIR, default ./logs
      # relative to the image's WORKDIR /app) so an admin retrieving logs
      # via /api/admin/logs sees the scheduler's activity too, not just
      # the API server's own. See docs/design/11-deployment.md.
      - app_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  migrate:
    build:
      context: ./backend
    # No "uv run" prefix -- the final Dockerfile stage doesn't have uv
    # installed (only the discarded build stage does); PATH already
    # points at /app/.venv/bin, where alembic lives directly.
    command: ["alembic", "upgrade", "head"]
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["migrate"]   # run explicitly: docker compose --profile migrate run migrate

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: logand
      POSTGRES_DB: logand
      # POSTGRES_PASSWORD is read from backend/.env via env_file below -- NOT inlined here.
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logand"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  # Recurring-invoice generation -- see domain/invoices/recurrence.py and
  # scripts/scheduler.py's own doc comment. Reuses the SAME built backend
  # image (same code/deps, no separate Dockerfile to keep in sync), just
  # with a different command -- a long-running sleep-until-next-run loop
  # instead of uvicorn, so it never needs system cron (which would need
  # this image's non-root appuser to somehow gain crontab-management
  # privileges it deliberately doesn't have).
  scheduler:
    build:
      context: ./backend
    command: ["uv", "run", "python", "-m", "logand_backend.scripts.scheduler"]
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - app_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy

  backup:
    build:
      context: ./ops
      dockerfile: backup.Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data:ro
      # Same volume the backend writes STORAGE_BACKEND=local files to --
      # see backend service's own doc comment above. Renamed from the old
      # budget_evidence (pre-dates the general storage abstraction; budget
      # evidence, receipts, and documents/CAD files all now live under one
      # storage root).
      - storage_data:/evidence:ro
      - backup_staging:/backup

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  storage_data:
  backup_staging:
  app_logs:
